services:
  redis:
    image: redis:7-alpine
    container_name: tft-redis
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Europe/Berlin}
    volumes:
      - redis_data:/data

  database:
    image: postgres:16-alpine
    container_name: tft-database
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Europe/Berlin}
      POSTGRES_DB: ${POSTGRES_DB:-tft_trading}
      POSTGRES_USER: ${POSTGRES_USER:-trader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trader}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trader} -d ${POSTGRES_DB:-tft_trading}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  engine-btc:
    build:
      context: .
      dockerfile: Dockerfile.engine
    image: tft-engine-runtime:latest
    command: ["python3.11", "scripts/run_engine.py"]
    env_file: .env
    environment:
      SYMBOL: BTC-USDT
      SPOT_ONLY_MODE: "false"
      ALLOW_SHORTS: "true"
      MAX_POSITION_PCT: "1.0"
      MAX_NOTIONAL_PER_TRADE: "1000000000"
      ORACLE_ENABLED: "false"
      REDIS_HOST: redis
      DATABASE_MODE: ${DATABASE_MODE:-SQLITE}
      POSTGRES_HOST: database
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-tft_trading}
      POSTGRES_USER: ${POSTGRES_USER:-trader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trader}
      SQLITE_PATH: /app/state/tft_engine.db
      PAPER_DB_PATH: /app/state/paper_trading.db
      ENGINE_LOCK_FILE: /app/state/tft_engine.lock
      ENGINE_HEALTH_PORT: "9000"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ./state/btc:/app/state
      - ./saved_models:/app/saved_models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3.11", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  api-btc:
    image: tft-engine-runtime:latest
    command: ["python3.11", "-m", "uvicorn", "dashboard.api:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: .env
    environment:
      SYMBOL: BTC-USDT
      ORACLE_ENABLED: "false"
      REDIS_HOST: redis
      DATABASE_MODE: ${DATABASE_MODE:-SQLITE}
      POSTGRES_HOST: database
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-tft_trading}
      POSTGRES_USER: ${POSTGRES_USER:-trader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trader}
      SQLITE_PATH: /app/state/tft_engine.db
      PAPER_DB_PATH: /app/state/paper_trading.db
      ENGINE_LOCK_FILE: /app/state/tft_engine.lock
    volumes:
      - ./state/btc:/app/state
      - ./saved_models:/app/saved_models:ro
    ports:
      - "8001:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3.11", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      database:
        condition: service_healthy
      engine-btc:
        condition: service_healthy

  engine-eth:
    image: tft-engine-runtime:latest
    command: ["python3.11", "scripts/run_engine.py"]
    env_file: .env
