        condition: service_healthy
      redis:
        condition: service_started
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    image: tft-dashboard:latest
    env_file: .env
    environment:
      SYMBOL: BTC-USDT
      API_BASE: http://api-btc:8000/api
      API_BASE_BTC: http://api-btc:8000/api
      API_BASE_ETH: http://api-eth:8000/api
      API_BASE_XRP: http://api-xrp:8000/api
      API_BASE_DOGE: http://api-doge:8000/api
    volumes:
      - ./state:/app/state:ro
    ports:
      - "${DASHBOARD_HOST_PORT:-8501}:8501"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3.11", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      api-btc:
        condition: service_healthy
      api-eth:
        condition: service_healthy
      api-xrp:
        condition: service_healthy
      api-doge:
        condition: service_healthy

  engine-monitor:
    build:
      context: .
      dockerfile: Dockerfile.engine
    image: tft-engine-runtime:latest
    container_name: tft-engine-monitor
    command: ["python3.11", "scripts/engine_monitor.py"]
    env_file: .env
    environment:
      ORACLE_ENABLED: "false"
    user: "0:0"
    volumes:
      - ./state:/app/state
      - ./scripts:/app/scripts:ro
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    depends_on:
      - engine-btc
      - engine-eth
      - engine-xrp
      - engine-doge

  quant-engine:
    profiles: ["quant"]
    build:
      context: .
      dockerfile: Dockerfile.engine
    image: tft-engine-runtime:latest
    command: ["python3.11", "scripts/run_quant_engine.py"]
    env_file: .env
    environment:
      QUANT_ENGINE_ENABLED: "true"
      TRADING_MODE: PAPER
      UNIVERSE: ${UNIVERSE:-BTC-USDT,ETH-USDT,SOL-USDT,BNB-USDT,DOGE-USDT,XRP-USDT,AVAX-USDT}
      ENGINE_MARKET_INTERVAL_SECONDS: "10"
      ENGINE_SIGNAL_INTERVAL_SECONDS: "60"
      ENGINE_REBALANCE_INTERVAL_SECONDS: "300"
      SQLITE_PATH: /app/state/tft_engine.db
      PAPER_DB_PATH: /app/state/paper_trading.db
      ENGINE_LOCK_FILE: /app/state/tft_engine.lock
      DATABASE_MODE: ${DATABASE_MODE:-SQLITE}
      POSTGRES_HOST: database
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-tft_trading}
      POSTGRES_USER: ${POSTGRES_USER:-trader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trader}
    volumes:
      - ./state/quant:/app/state
      - ./saved_models:/app/saved_models:ro
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started

  quant-api:
    profiles: ["quant"]
    build:
      context: .
      dockerfile: Dockerfile.engine
    image: tft-engine-runtime:latest
    command: ["python3.11", "-m", "uvicorn", "dashboard.api:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: .env
    environment:
      QUANT_ENGINE_ENABLED: "true"
      TRADING_MODE: PAPER
