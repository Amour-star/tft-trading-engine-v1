    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
      engine-btc:
        condition: service_started
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  api-doge:
    image: tft-engine-runtime:latest
    command: ["python3.11", "-m", "uvicorn", "dashboard.api:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: .env
    environment:
      SYMBOL: DOGE-USDT
      ORACLE_ENABLED: "false"
      REDIS_HOST: redis
      DATABASE_MODE: ${DATABASE_MODE:-SQLITE}
      POSTGRES_HOST: database
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-tft_trading}
      POSTGRES_USER: ${POSTGRES_USER:-trader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trader}
      SQLITE_PATH: /app/state/tft_engine.db
      PAPER_DB_PATH: /app/state/paper_trading.db
      ENGINE_LOCK_FILE: /app/state/tft_engine.lock
    volumes:
      - ./state/doge:/app/state
      - ./saved_models:/app/saved_models:ro
    ports:
      - "8004:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3.11", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      database:
        condition: service_healthy
      engine-doge:
        condition: service_healthy

  training:
    profiles: ["training"]
    build:
      context: .
      dockerfile: Dockerfile.training
    image: tft-training:latest
    command: ["bash", "-lc", "python3.11 scripts/train_model.py && python3.11 scripts/train_meta_model.py && python3.11 scripts/train_rl_manager.py"]
    env_file: .env
    environment:
      ORACLE_ENABLED: "false"
      REDIS_HOST: redis
      DATABASE_MODE: ${DATABASE_MODE:-SQLITE}
      POSTGRES_HOST: database
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-tft_trading}
      POSTGRES_USER: ${POSTGRES_USER:-trader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trader}
      SQLITE_PATH: /app/state/tft_engine.db
      PAPER_DB_PATH: /app/state/paper_trading.db
      ENGINE_LOCK_FILE: /app/state/tft_engine.lock
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
